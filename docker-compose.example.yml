# Optional local stack: PostgreSQL for Laravel. Copy to docker-compose.yml and adjust.
# Run API with: php artisan serve (host) or add a php service as needed.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: volunteer_events
      POSTGRES_USER: ve
      POSTGRES_PASSWORD: ve_local
    ports:
      - "5432:5432"
    volumes:
      - ve_pgdata:/var/lib/postgresql/data

volumes:
  ve_pgdata:
